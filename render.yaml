services:
  - type: web
    name: simfly-os
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: GOOGLE_API_KEY
        sync: false
      - key: ADMIN_NUMBER
        sync: false
      - key: RENDER_URL
        sync: false
    autoDeploy: true
